services:
  - type: web
    name: nexus-ai-api
    region: oregon
    plan: free
    buildCommand: npm install --no-audit --no-fund --include=dev && npx prisma generate --schema=packages/db/prisma/schema.prisma && npx prisma db push --schema=packages/db/prisma/schema.prisma
    startCommand: cd apps/api && npx --no-install tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:../packages/db/dev.db