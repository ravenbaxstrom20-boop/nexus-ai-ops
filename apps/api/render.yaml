services:
  - type: web
    name: nexus-ai-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate --schema=packages/db/prisma/schema.prisma && npx prisma db push --schema=packages/db/prisma/schema.prisma --accept-data-loss && npx tsx packages/db/prisma/seed.ts
    startCommand: npx tsx apps/api/src/index.ts
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

databases:
  - name: nexus-db
    plan: free
    region: oregon
